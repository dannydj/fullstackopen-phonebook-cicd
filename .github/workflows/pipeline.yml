name: Phonebook deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  phonebook_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: npm install

      - name: Check style
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Trigger deployment
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
        run: curl --fail-with-body "${{ secrets.RENDER_DEPLOY_HOOK }}"